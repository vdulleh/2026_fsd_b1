<body>
    <main>
      <section>
        <form>
          <div class="form-row">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="what should we call you?" />
            </div>
        
          
          <div class="form-row error">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="what is your email address?" />
            <span>Email is already taken</span> 
            </div>

            <div class="form-row">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="xxxxxxxxxxxx" />
            </div>


            <div class="form-row">
            <label for="con">Confirm Password:</label>
            <input type="password" id="ConfirmPassword" name="con" placeholder="xxxxxxxxxxxx" />
            </div>

            <summit>Update Profile</summit>

        </form>
        </section>

     <div class="progress">
  <span>65%</span>
</div>
